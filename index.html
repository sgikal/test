<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mar Nocturno</title>
    <link rel="stylesheet" href="style.css">
</head>


<body oncontextmenu="return false;">

<div id="start-hint" style="position: fixed; top: 10px; left: 10px; color: white; z-index: 2000; font-family: sans-serif; font-size: 0.8rem; opacity: 0.7;">
    Haz clic en cualquier lugar para activar el sonido del mar 
</div>

<audio id="sea-sound" loop>
    <source src="mar.mp3" type="audio/mpeg">
</audio>

<div class="sky">
    <div class="moon"></div>
</div>

<div class="ocean">
    <div class="reflection"></div>
    
    <div class="bottle" style="--i:1; left: 15%;" data-name="Tormenta" data-effect="rain"></div>
    
    <div class="bottle" style="--i:2; left: 40%;" data-name="Viento" data-effect="wind"></div>
    
    <div class="bottle" style="--i:3; left: 65%;" data-name="Rayos" data-effect="lightning"></div>
    
    <div class="bottle" style="--i:4; left: 85%;" data-name="Mensaje en Calma" data-effect="none"></div>
</div>

<div id="modal-overlay" class="overlay">
    <div class="paper-message" id="main-paper">
        <span class="close-btn">&times;</span>
        
        <div id="web-content" style="display: none; width: 100%; height: 100%;">
            <iframe id="web-portal" src="" frameborder="0" style="width: 100%; height: 400px; border-radius: 5px;"></iframe>
            <p style="font-size: 0.7rem; text-align: center; margin-top: 5px;">Estás viendo un fragmento de otro mundo...</p>
        </div>

        <div id="special-content" style="display: none;">
            <h3 style="margin-top: 0;">Mensaje de la marea...</h3>
            <p id="random-message" style="font-style: italic; border-bottom: 1px dashed #8b4513; padding-bottom: 10px;"></p>
            <p style="font-size: 0.8rem; margin-top: 15px;">Deja tu propio mensaje:</p>
            <textarea id="user-input" placeholder="Escribe algo..." rows="3" style="width: 100%; background: transparent; border: 1px solid #8b4513; font-family: inherit;"></textarea>
            <button id="save-btn" style="margin-top: 10px; background: #8b4513; color: white; border: none; padding: 5px 15px; cursor: pointer;">Lanzar al mar</button>
        </div>
    </div>
</div>
	
	
<div id="modal-overlay" class="overlay">
    <div class="paper-message">
        <span class="close-btn">&times;</span>
        <div id="message-text">Este es un mensaje del mar...</div>
    </div>
</div>

<script src="script2.js"></script>
</body>
</html>
